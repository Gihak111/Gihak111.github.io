<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gihak | Digital Business Card</title>
    <!-- 구글 폰트: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome (아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --hover-bg: #f3f4f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* 모바일 환경을 고려하여 상단부터 배치 */
            padding: 4rem 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 480px;
            /* 명함 링크(Linktree 스타일)에 적합한 폭 */
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2.5rem;
            width: 100%;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            margin-bottom: 1.2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        p.bio {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            padding: 0 1rem;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 1.1rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .link-card:hover {
            background-color: var(--hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .link-icon {
            font-size: 1.3rem;
            margin-right: 1.2rem;
            width: 24px;
            text-align: center;
            color: var(--text-muted);
        }

        .link-text-wrapper {
            display: flex;
            flex-direction: column;
        }

        .link-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-main);
        }

        .link-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="profile-header">
            <!-- 프로필 이미지 -->
            <img src="https://avatars.githubusercontent.com/u/9919?s=200&v=4" alt="Profile" class="profile-img"
                id="profile-pic">
            <h1>연준모</h1>
            <p class="bio">
                AI 엔지니어 및 개발자
            </p>
        </div>

        <div class="links-container">

            <!-- 회사 링크 -->
            <a href="https://oneclickai.co.kr/" target="_blank" class="link-card">
                <div class="link-icon">
                    <i class="fas fa-building" style="color: #0284c7;"></i>
                </div>
                <div class="link-text-wrapper">
                    <span class="link-title">OneClickAI</span>
                    <span class="link-subtitle">원클릭에이아이 회사 홈페이지</span>
                </div>
            </a>

            <!-- 유튜브 링크 -->
            <a href="https://www.youtube.com/@oneclickai-co-kr" target="_blank" class="link-card">
                <div class="link-icon">
                    <i class="fab fa-youtube" style="color: #dc2626;"></i>
                </div>
                <div class="link-text-wrapper">
                    <span class="link-title">YouTube</span>
                    <span class="link-subtitle">@oneclickai-co-kr</span>
                </div>
            </a>

            <!-- 허깅페이스 링크 -->
            <a href="https://huggingface.co/gihakkk" target="_blank" class="link-card">
                <div class="link-icon">
                    <img src="https://huggingface.co/front/assets/huggingface_logo-noborder.svg" alt="Hugging Face"
                        style="width: 20px; height: 20px; display: block; margin: 0 auto; filter: grayscale(100%); opacity: 0.8;">
                </div>
                <div class="link-text-wrapper">
                    <span class="link-title">Hugging Face</span>
                    <span class="link-subtitle">gihakk</span>
                </div>
            </a>

            <!-- 깃허브 링크 -->
            <a href="https://github.com/Gihak111" target="_blank" class="link-card">
                <div class="link-icon">
                    <i class="fab fa-github" style="color: #1f2937;"></i>
                </div>
                <div class="link-text-wrapper">
                    <span class="link-title">GitHub</span>
                    <span class="link-subtitle">Gihak111</span>
                </div>
            </a>

            <!-- 블로그 링크 -->
            <a href="https://Gihak111.github.io" target="_blank" class="link-card">
                <div class="link-icon">
                    <i class="fas fa-book" style="color: #10b981;"></i>
                </div>
                <div class="link-text-wrapper">
                    <span class="link-title">Tech Blog</span>
                    <span class="link-subtitle">개발 블로그</span>
                </div>
            </a>

        </div>
    </div>

    <!-- 깃허브 프로필 이미지 자동 불러오기 스크립트 -->
    <script>
        const githubUsername = 'Gihak111';
        fetch(`https://api.github.com/users/${githubUsername}`)
            .then(response => response.json())
            .then(data => {
                if (data.avatar_url) {
                    document.getElementById('profile-pic').src = data.avatar_url;
                }
            })
            .catch(error => console.error('GitHub API 에러:', error));
    </script>
</body>

</html>
